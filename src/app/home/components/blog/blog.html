 <!--BLOG SECTION START-->
 <section class="blog" id="blog">
    <div class="container d-flex flex-column justify-content-between h-100 ">
        <div class="section-title flex-grow-1">
            <div class="row">
                <div class="col-lg-12">
                    <div class="text-center">
                        <h2 data-aos="heading-show" class="text_background">
                            {{ data.title }}
                            <span class="heading_background">{{ data.subtitle }}</span>
                        </h2>
                        <p class="m-0">{{ data.description }}</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="section-content flex-grow-1">
            <div class="row">
                <div class="col-lg-4 col-md-12" *ngFor="let post of data.posts">
                    <div class="news-item mb-5 mb-lg-0">
                        <div class="news-cover">
                            <img [src]="post.imageUrl" width="800" height="530" [alt]="post.title" class="img-fluid">
                        </div>
                        <div class="news-content p-4">
                            <div class="news-title mb-3">
                                <a [href]="post.link" class="blog-permalink">
                                    <h3>{{ post.title }}</h3>
                                </a>
                            </div>
                            <div class="news-meta d-flex flex-row mb-4">
                                <div class="news-meta-single mr-3">
                                    <span class="mbri-calendar"></span>
                                    <span class="meta-value">{{ post.date | date:'dd MMMM, yyyy' }}</span>
                                </div>
                                <div class="news-meta-single">
                                    <span class="mbri-user"></span>
                                    <span class="meta-value">by <a [href]="post.link">{{ post.author }}</a></span>
                                </div>
                            </div>
                            <div class="readMore">
                                <a [href]="post.link" class="btn btn-outline-primary">Read More</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mt-5" *ngIf="!data.posts.length">
                <div class="col-12">
                    <div class="news-item p-4 text-center">
                        <h3 class="mb-2">New stories are coming</h3>
                        <p class="m-0">I share updates about projects, experiments and design/dev workflows.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
